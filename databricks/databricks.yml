# Databricks Asset Bundle for the MontelEQ ingestion pipeline.
#
# Follows the Meteologica (https://github.com/Platob/Meteologica) ingestion
# pattern, sourcing data from EnergyQuantified (EQ):
#
#   monteleq_dispatcher
#       dispatcher (self-contained orchestrator)
#
#       The dispatcher task:
#         1. Refreshes the curve-metadata referential
#         2. Scans for work and queues it:
#              - scheduled (seconds <= 3600): streams EQ curve-update events and
#                queues the updated curves into `pending_requests`, bucketed by
#                table_category
#              - backfill (seconds > 3600): dispatches every known category over
#                the full window (no queue)
#         3. Gets/creates one dedicated all-purpose cluster per category,
#            in parallel across categories
#         4. Submits one `ingest_category` job run per category on its cluster
#
#       By default (scheduled every hour):
#           dispatcher pins end_date=now, seconds=3600.
#           Each table_category runs on its own dedicated cluster.
#
#   Manual backfill example (6 months, overwrite):
#
#   databricks bundle run -t prd monteleq_dispatcher \
#       --params end_date=2024-06-30T23:59:59Z \
#       --params seconds=15811200 \
#       --params mode=overwrite \
#       --profile monteleq-prd
#
#   Relaunch specific table categories only:
#
#   databricks bundle run -t prd monteleq_dispatcher \
#       --params table_category=actual_timeseries_power,forecast_instance_wind

bundle:
  name: monteleq

variables:
  catalog_name:
    description: "Unity Catalog name."
    default: trading_tgp_prd
  schema_name:
    description: "Schema within the catalog."
    default: src_monteleq
  cluster_id:
    description: "Existing cluster for the dispatcher (metadata refresh + API scan + fan-out)."
    default: 0525-144942-xjlhyl98
  notebook_root:
    description: "Workspace path the notebooks are uploaded to."
    default: /Workspace/Shared/MontelEQ/databricks/notebooks

workspace:
  host: https://dbc-82edd6f4-1e97.cloud.databricks.com

resources:
  jobs:
    monteleq_dispatcher:
      name: monteleq-dispatcher
      max_concurrent_runs: 4
      tags:
        package: monteleq
        pipeline: ingestion-dispatcher

      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED

      parameters:
        - name: seconds
          default: "3600"
        - name: end_date
          default: ""
        - name: table_category
          default: ""
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: mode
          default: append

      tasks:
        - task_key: dispatcher
          existing_cluster_id: ${var.cluster_id}
          timeout_seconds: 1200
          notebook_task:
            notebook_path: ./notebooks/dispatcher.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              table_category: "{{job.parameters.table_category}}"
              end_date: "{{job.parameters.end_date}}"
              seconds: "{{job.parameters.seconds}}"
              mode: "{{job.parameters.mode}}"
              notebook_root: ${var.notebook_root}

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog_name: trading_tgp_dev
      cluster_id: 0525-144942-xjlhyl98

  prod:
    mode: production
    variables:
      catalog_name: trading_tgp_prd
      cluster_id: 0525-144942-xjlhyl98
    run_as:
      service_principal_name: monteleq-service-principal
