# Databricks Asset Bundle for the MontelEQ pipeline. Single unified job:
#
#   monteleq_ingestion
#       plan → ingest_by_group (per data_type×curve_type fan-out)
#
#       Each (data_type, curve_type) group runs on its own dedicated cluster,
#       distributing the ingestion load across multiple compute resources.
#
#       By default (scheduled every hour):
#           `plan` resolves table categories, groups them by (data_type, curve_type),
#           and pins end_date=now, seconds=3600.
#           `ingest_by_group` fetches that window on a per-group cluster,
#           then appends to the relevant curated_* tables.
#
#       Manual backfill:
#           Set `end_date` and `seconds` to cover the desired window.
#           `mode` can be set to `overwrite`.
#
#   Manual backfill example:
#
#   databricks bundle run -t prd monteleq_ingestion \
#       --params end_date=2024-06-30T23:59:59Z \
#       --params seconds=15811200 \
#       --params mode=overwrite \
#       --profile monteleq-prd
#
#   Relaunch specific table categories only:
#
#   databricks bundle run -t prd monteleq_ingestion \
#       --params table_category=curated_actual_timeseries_power,curated_forecast_instance_wind

bundle:
  name: monteleq

variables:
  catalog_name:
    description: "Unity Catalog name."
    default: trading_tgp_prd
  schema_name:
    description: "Schema within the catalog."
    default: src_monteleq
  cluster_id:
    description: "Cluster for the plan task."
    default: 0525-144942-xjlhyl98
  ingestion_spark_version:
    description: "Databricks Runtime for per-group ingestion clusters."
    default: "15.4.x-scala2.12"
  ingestion_node_type_id:
    description: "Instance type for per-group ingestion clusters."
    default: "m5.xlarge"

workspace:
  host: https://dbc-82edd6f4-1e97.cloud.databricks.com

resources:
  jobs:
    monteleq_ingestion:
      name: monteleq-ingestion
      max_concurrent_runs: 1
      tags:
        package: monteleq
        pipeline: ingestion

      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: UTC

      parameters:
        - name: end_date
          default: "now"
        - name: seconds
          default: "3600"
        - name: table_category
          default: ""
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: mode
          default: append

      tasks:
        - task_key: plan
          existing_cluster_id: ${var.cluster_id}
          notebook_task:
            notebook_path: ./notebooks/plan.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              table_category: "{{job.parameters.table_category}}"
              end_date: "{{job.parameters.end_date}}"
              seconds: "{{job.parameters.seconds}}"
              mode: "{{job.parameters.mode}}"

        - task_key: ingest_by_group
          depends_on:
            - task_key: plan
          for_each_task:
            inputs: "{{tasks.plan.values.groups}}"
            concurrency: 10
            task:
              task_key: ingest_group
              new_cluster:
                spark_version: ${var.ingestion_spark_version}
                node_type_id: ${var.ingestion_node_type_id}
                num_workers: 2
              libraries:
                - pypi:
                    package: "ygg[databricks]==0.8.*"
                - pypi:
                    package: "energyquantified"
              notebook_task:
                notebook_path: ./notebooks/ingest_by_group.py
                base_parameters:
                  cluster_key: "{{input.cluster_key}}"
                  table_categories: "{{input.table_categories}}"
                  end_date: "{{input.end_date}}"
                  seconds: "{{input.seconds}}"
                  catalog_name: "{{job.parameters.catalog_name}}"
                  schema_name: "{{job.parameters.schema_name}}"
                  mode: "{{job.parameters.mode}}"

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog_name: trading_tgp_dev
      cluster_id: 0525-144942-xjlhyl98

  prod:
    mode: production
    variables:
      catalog_name: trading_tgp_prd
      cluster_id: 0525-144942-xjlhyl98
    run_as:
      service_principal_name: monteleq-service-principal
