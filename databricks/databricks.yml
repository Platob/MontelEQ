# Databricks Asset Bundle for the MontelEQ pipeline. Single unified job:
#
#   monteleq_ingestion
#       plan → ingest_by_category (per-category fan-out)
#
#       Supports two modes via the `latest` job parameter:
#
#       latest=true (default, scheduled every hour):
#           `plan` resolves categories from the curve catalog.
#           `ingest_by_category` fetches the last `period_hours`,
#           appends to curated_* tables.
#
#       latest=false (manual backfill):
#           Same plan step, but `ingest_by_category` uses explicit
#           `start`/`end` window.  `mode` can be set to `overwrite`.
#
#   Manual backfill example:
#
#   databricks bundle run -t prd monteleq_ingestion \
#       --params latest=false \
#       --params start=2024-01-01T00:00:00Z \
#       --params end=2024-06-30T23:59:59Z \
#       --params mode=overwrite \
#       --profile monteleq-prd

bundle:
  name: monteleq

variables:
  catalog_name:
    description: "Unity Catalog name."
    default: trading_tgp_prd
  schema_name:
    description: "Schema within the catalog."
    default: src_monteleq
  cluster_id:
    description: "Cluster for HTTP-heavy raw+curate work."
    default: 0522-063219-lfvirtho
  period_hours:
    description: "Lookback window in hours when latest=true."
    default: "1"

workspace:
  host: https://dbc-82edd6f4-1e97.cloud.databricks.com

resources:
  jobs:
    monteleq_ingestion:
      name: monteleq-ingestion
      max_concurrent_runs: 1
      tags:
        package: monteleq
        pipeline: ingestion

      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: UTC

      parameters:
        - name: latest
          default: "true"
        - name: start
          default: ""
        - name: end
          default: ""
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: period_hours
          default: ${var.period_hours}
        - name: mode
          default: append

      tasks:
        - task_key: plan
          existing_cluster_id: ${var.cluster_id}
          notebook_task:
            notebook_path: ./notebooks/plan.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"

        - task_key: ingest_by_category
          depends_on:
            - task_key: plan
          existing_cluster_id: ${var.cluster_id}
          for_each_task:
            inputs: "{{tasks.plan.values.notebook_output.result}}"
            task:
              task_key: ingest_category
              notebook_task:
                notebook_path: ./notebooks/ingest_by_category.py
                base_parameters:
                  curve_category: "{{input}}"
                  latest: "{{job.parameters.latest}}"
                  start: "{{job.parameters.start}}"
                  end: "{{job.parameters.end}}"
                  catalog_name: "{{job.parameters.catalog_name}}"
                  schema_name: "{{job.parameters.schema_name}}"
                  period_hours: "{{job.parameters.period_hours}}"
                  mode: "{{job.parameters.mode}}"

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog_name: trading_tgp_dev
      cluster_id: 0522-063219-lfvirtho

  prod:
    mode: production
    variables:
      catalog_name: trading_tgp_prd
      cluster_id: 0522-063219-lfvirtho
    run_as:
      service_principal_name: monteleq-service-principal
