# Databricks Asset Bundle for the MontelEQ pipeline. Single unified job:
#
#   monteleq_ingestion
#       plan → ingest_by_category (per-category fan-out)
#
#       When no start_date/end_date are provided (default, scheduled every hour):
#           `plan` resolves categories from the curve catalog.
#           `ingest_by_category` fetches the last hour, appends to curated_* tables.
#
#       When start_date (and optionally end_date) are provided (manual backfill):
#           Same plan step, but `ingest_by_category` uses the explicit
#           date window.  `mode` can be set to `overwrite`.
#
#   Manual backfill example:
#
#   databricks bundle run -t prd monteleq_ingestion \
#       --params start_date=2024-01-01T00:00:00Z \
#       --params end_date=2024-06-30T23:59:59Z \
#       --params mode=overwrite \
#       --profile monteleq-prd
#
#   Relaunch specific categories only:
#
#   databricks bundle run -t prd monteleq_ingestion \
#       --params categories=curated_actual_timeseries_power,curated_forecast_instance_wind

bundle:
  name: monteleq

variables:
  catalog_name:
    description: "Unity Catalog name."
    default: trading_tgp_prd
  schema_name:
    description: "Schema within the catalog."
    default: src_monteleq
  cluster_id:
    description: "Cluster for HTTP-heavy raw+curate work."
    default: 0522-063219-lfvirtho

workspace:
  host: https://dbc-82edd6f4-1e97.cloud.databricks.com

resources:
  jobs:
    monteleq_ingestion:
      name: monteleq-ingestion
      max_concurrent_runs: 1
      tags:
        package: monteleq
        pipeline: ingestion

      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: UTC

      parameters:
        - name: start_date
          default: ""
        - name: end_date
          default: ""
        - name: categories
          default: ""
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: mode
          default: append

      tasks:
        - task_key: plan
          existing_cluster_id: ${var.cluster_id}
          notebook_task:
            notebook_path: ./notebooks/plan.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              categories: "{{job.parameters.categories}}"
              mode: "{{job.parameters.mode}}"

        - task_key: ingest_by_category
          depends_on:
            - task_key: plan
          existing_cluster_id: ${var.cluster_id}
          for_each_task:
            inputs: "{{tasks.plan.values.notebook_output.result}}"
            task:
              task_key: ingest_category
              notebook_task:
                notebook_path: ./notebooks/ingest_by_category.py
                base_parameters:
                  table_category: "{{input}}"
                  start_date: "{{job.parameters.start_date}}"
                  end_date: "{{job.parameters.end_date}}"
                  catalog_name: "{{job.parameters.catalog_name}}"
                  schema_name: "{{job.parameters.schema_name}}"
                  mode: "{{job.parameters.mode}}"

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog_name: trading_tgp_dev
      cluster_id: 0522-063219-lfvirtho

  prod:
    mode: production
    variables:
      catalog_name: trading_tgp_prd
      cluster_id: 0522-063219-lfvirtho
    run_as:
      service_principal_name: monteleq-service-principal
